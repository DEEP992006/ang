<h2>Registration Form</h2>

<form (ngSubmit)="onSubmit()">
  <div>
    <label for="firstName">First Name</label>
    <input id="firstName" name="firstName" type="text" [(ngModel)]="formData.firstName" required />
  </div>

  <div>
    <label for="lastName">Last Name</label>
    <input id="lastName" name="lastName" type="text" [(ngModel)]="formData.lastName" required />
  </div>

  <div>
    <label for="email">Email</label>
    <input id="email" name="email" type="email" [(ngModel)]="formData.email" required />
  </div>

  <div>
    <label for="phone">Phone</label>
    <input id="phone" name="phone" type="tel" [(ngModel)]="formData.phone" required />
  </div>

  <div>
    <label for="username">Username</label>
    <input id="username" name="username" type="text" [(ngModel)]="formData.username" required />
  </div>

  <div>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" [(ngModel)]="formData.password" required />
  </div>

  <div>
    <label for="confirmPassword">Confirm Password</label>
    <input id="confirmPassword" name="confirmPassword" type="password" [(ngModel)]="formData.confirmPassword" required />
  </div>

  <button type="submit">Register</button>
</form>
